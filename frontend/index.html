<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiingy Story Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#534AB7',
            teal: '#0F6E56',
            amber: '#BA7517',
            green: '#3B6D11',
            red: '#E24B4A',
            bg: '#f9f9f8',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    body { background: #f9f9f8; }
    .score-bar-fill { transition: width 0.4s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* ── helpers ── */
    function api(path, opts = {}) {
      return fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      }).then(r => {
        if (!r.ok) throw new Error(`API error ${r.status}`);
        return r;
      });
    }

    function downloadCsv(path) {
      const a = document.createElement('a');
      a.href = path;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function fmtDate(d) {
      if (!d) return '';
      const p = new Date(d);
      if (isNaN(p)) return d;
      return p.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function defaultFrom() {
      const d = new Date(); d.setDate(d.getDate() - 7);
      return d.toISOString().slice(0, 10);
    }
    function defaultTo() { return new Date().toISOString().slice(0, 10); }

    const US_STATES = [
      'All States','Alabama','Alaska','Arizona','Arkansas','California','Colorado',
      'Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho','Illinois',
      'Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland',
      'Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana',
      'Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York',
      'North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania',
      'Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah',
      'Vermont','Virginia','Washington','West Virginia','Wisconsin','Wyoming'
    ];

    /* ── State Selector ── */
    function StateSelector({ value, onChange }) {
      const [open, setOpen] = useState(false);
      const [filter, setFilter] = useState('');
      const ref = useRef(null);

      useEffect(() => {
        function handleClick(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
        document.addEventListener('mousedown', handleClick);
        return () => document.removeEventListener('mousedown', handleClick);
      }, []);

      const filtered = US_STATES.filter(s => s.toLowerCase().includes(filter.toLowerCase()));
      const displayValue = value === 'all' ? 'All States' : value;

      return (
        <div className="space-y-1">
          <label className="text-sm font-medium text-gray-700">US State</label>
          <div className="flex items-center gap-2">
            <div ref={ref} className="relative">
              <button type="button" onClick={() => { setOpen(!open); setFilter(''); }}
                className="flex items-center gap-1.5 border border-gray-200 rounded px-3 py-1.5 text-sm text-gray-700 hover:border-brand/50 min-w-[180px] justify-between">
                <span>{displayValue}</span>
                <svg className="w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
              </button>
              {open && (
                <div className="absolute z-50 mt-1 w-56 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden">
                  <div className="p-2 border-b border-gray-100">
                    <input autoFocus value={filter} onChange={e => setFilter(e.target.value)}
                      placeholder="Search states..."
                      className="w-full text-sm px-2 py-1 border border-gray-200 rounded outline-none focus:ring-1 focus:ring-brand/30" />
                  </div>
                  <div className="max-h-48 overflow-y-auto">
                    {filtered.map(s => (
                      <button key={s} type="button"
                        onClick={() => { onChange(s === 'All States' ? 'all' : s); setOpen(false); setFilter(''); }}
                        className={`block w-full text-left px-3 py-1.5 text-sm hover:bg-brand/5 ${(s === 'All States' && value === 'all') || s === value ? 'bg-brand/10 text-brand font-medium' : 'text-gray-700'}`}>
                        {s}
                      </button>
                    ))}
                    {filtered.length === 0 && <div className="px-3 py-2 text-xs text-gray-400">No states found</div>}
                  </div>
                </div>
              )}
            </div>
            {value !== 'all' && (
              <Pill text={value} onRemove={() => onChange('all')} />
            )}
          </div>
        </div>
      );
    }

    /* ── Toast ── */
    function Toasts({ toasts }) {
      return (
        <div className="fixed top-4 right-4 z-50 flex flex-col gap-2">
          {toasts.map(t => (
            <div key={t.id} className={`${t.variant === 'warning' ? 'bg-amber' : 'bg-red'} text-white px-4 py-2 rounded shadow-lg text-sm max-w-xs`}>
              {t.msg}
            </div>
          ))}
        </div>
      );
    }

    /* ── Spinner ── */
    function Spinner({ size = 'w-4 h-4' }) {
      return <svg className={`${size} animate-spin`} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeDasharray="30 70" strokeLinecap="round"/></svg>;
    }

    /* ── Pill ── */
    function Pill({ text, onRemove, color = 'bg-brand/10 text-brand' }) {
      return (
        <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium ${color}`}>
          {text}
          {onRemove && <button onClick={onRemove} className="ml-0.5 hover:text-red">×</button>}
        </span>
      );
    }

    /* ── Heart ── */
    function Heart({ filled, onClick }) {
      return (
        <button onClick={onClick} className="text-xl leading-none hover:scale-110 transition-transform" title={filled ? 'Remove from favourites' : 'Save to favourites'}>
          {filled
            ? <svg className="w-5 h-5 text-red fill-current" viewBox="0 0 20 20"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/></svg>
            : <svg className="w-5 h-5 text-gray-400" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/></svg>
          }
        </button>
      );
    }

    /* ── Score Bar ── */
    function ScoreBar({ label, score, color }) {
      const pct = Math.min(Math.max((score / 10) * 100, 0), 100);
      return (
        <div className="flex items-center gap-2 text-xs">
          <span className="w-32 text-gray-600 shrink-0">{label}</span>
          <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
            <div className={`h-full rounded-full score-bar-fill ${color}`} style={{ width: `${pct}%` }}></div>
          </div>
          <span className="w-8 text-right font-semibold text-gray-700">{score}/10</span>
        </div>
      );
    }

    const LENS_COLORS = {
      'Student': 'bg-brand/10 text-brand',
      'Parent': 'bg-amber/10 text-amber',
      'Educator': 'bg-green/10 text-green',
      'System': 'bg-teal/10 text-teal',
      'Opportunity': 'bg-red/10 text-red',
    };

    const LENS_BORDER = {
      'Student': 'border-brand',
      'Parent': 'border-amber',
      'Educator': 'border-green',
      'System': 'border-teal',
      'Opportunity': 'border-red',
    };

    const STYLE_BADGE = {
      'POLICY IMPACT': 'bg-blue-600 text-white',
      'CULTURAL THINK-PIECE': 'bg-brand text-white',
      'NEWS CONSEQUENCE': 'bg-teal text-white',
      'UNKNOWN': 'bg-gray-500 text-white',
    };

    function copyAnglePackage(a) {
      const text = `${a.title || ''}\n\n${a.learning_angle || ''}\n\n${a.wiingy_link || ''}`.trim();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
      }
    }

    /* ── Collapsible ── */
    function Collapsible({ open, onToggle, title, right, children, headerClass = '', bodyClass = 'px-4 pb-4 pt-2' }) {
      return (
        <div className="border border-gray-200 rounded-lg bg-white overflow-hidden">
          <div
            onClick={onToggle}
            role="button"
            className={`flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-gray-50 select-none ${headerClass}`}
          >
            <span className={`text-xs text-gray-400 inline-block transition-transform duration-200 shrink-0 ${open ? 'rotate-90' : ''}`}>▶</span>
            <span className="text-sm font-medium text-gray-700 flex-1 min-w-0">{title}</span>
            {right && <div className="shrink-0" onClick={(e) => e.stopPropagation()}>{right}</div>}
          </div>
          <div className={`overflow-hidden transition-[max-height] duration-300 ease-in-out ${open ? 'max-h-[5000px]' : 'max-h-0'}`}>
            <div className={bodyClass}>{children}</div>
          </div>
        </div>
      );
    }

    /* ── Angle Card ── */
    function AngleCard({ angle, open, onToggle }) {
      const [copied, setCopied] = useState(false);
      const borderClass = LENS_BORDER[angle.lens] || 'border-brand';
      const pillClass = LENS_COLORS[angle.lens] || 'bg-brand/10 text-brand';

      function handleCopy(e) {
        e.stopPropagation();
        copyAnglePackage(angle);
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      }

      return (
        <div className="border border-gray-200 rounded-lg bg-white overflow-hidden">
          <div
            onClick={onToggle}
            role="button"
            className="flex items-center gap-3 px-3 py-2.5 cursor-pointer hover:bg-gray-50 select-none"
          >
            <span className={`text-xs text-gray-400 inline-block transition-transform duration-200 shrink-0 ${open ? 'rotate-90' : ''}`}>▶</span>
            <Pill text={angle.lens} color={pillClass} />
            <h3 className="text-[15px] font-bold text-gray-900 leading-snug flex-1 min-w-0 line-clamp-2">{angle.title}</h3>
            <button onClick={handleCopy} className="inline-flex items-center gap-1 text-xs text-gray-500 hover:text-brand shrink-0" title="Copy angle package">
              {copied ? (
                <><svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg><span>Copied</span></>
              ) : (
                <><svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg><span>Copy</span></>
              )}
            </button>
          </div>
          <div className={`overflow-hidden transition-[max-height] duration-300 ease-in-out ${open ? 'max-h-[3000px]' : 'max-h-0'}`}>
            <div className="px-4 pb-4 pt-3 space-y-3 border-t border-gray-100">
              {angle.learning_angle && (
                <div className="space-y-1">
                  <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400">Learning Angle</p>
                  <p className={`text-sm text-gray-700 leading-relaxed border-l-4 ${borderClass} pl-3`}>
                    {angle.learning_angle}
                  </p>
                </div>
              )}

              {angle.wiingy_link && (
                <div className="space-y-1">
                  <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400">Wiingy Link</p>
                  <div className="flex items-start gap-2">
                    <span className="shrink-0 inline-flex items-center justify-center w-6 h-6 rounded-full bg-brand text-white text-xs font-bold" title="Wiingy">W</span>
                    <p className="text-sm italic text-gray-700 leading-relaxed">{angle.wiingy_link}</p>
                  </div>
                </div>
              )}

              {angle.suggested_sources && (
                <div className="space-y-1">
                  <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400">Suggested Sources</p>
                  <div className="flex flex-wrap gap-1.5">
                    {angle.suggested_sources.split(',').map((src, i) => {
                      const trimmed = src.trim();
                      return trimmed ? (
                        <span key={i} className="inline-flex items-center px-2 py-0.5 rounded bg-gray-100 text-gray-600 text-xs font-medium">
                          {trimmed}
                        </span>
                      ) : null;
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ── Story Card ── */
    function StoryCard({ story, onScore, onAngle, onFav, scoringId, anglingId }) {
      const [expanded, setExpanded] = useState(false);
      const [openStyle, setOpenStyle] = useState(true);
      const [openWhy, setOpenWhy] = useState(true);
      const [openAngles, setOpenAngles] = useState(true);
      const [openCards, setOpenCards] = useState([false, false, false, false, false]);
      const scored = story.overall_score != null;
      const hasAngles = Array.isArray(story.angles) && story.angles.length > 0;
      const topicReasoning = story.topic_reasoning;

      function toggleCard(i) {
        setOpenCards(prev => prev.map((v, idx) => idx === i ? !v : v));
      }
      function expandAll() {
        setOpenStyle(true); setOpenWhy(true); setOpenAngles(true);
        setOpenCards([true, true, true, true, true]);
      }
      function collapseAll() {
        setOpenStyle(false); setOpenWhy(false); setOpenAngles(false);
        setOpenCards([false, false, false, false, false]);
      }

      return (
        <div className="bg-white border border-gray-200 rounded-lg p-4 space-y-3">
          <div className="flex items-start justify-between gap-2">
            <div className="flex-1 min-w-0">
              <a href={story.url} target="_blank" rel="noopener noreferrer" className="font-semibold text-gray-900 hover:text-brand leading-snug block">
                {story.title}
              </a>
              <div className="flex items-center gap-2 mt-1 text-xs text-gray-500">
                <span>{story.source}</span>
                {story.published && <><span>·</span><span>{fmtDate(story.published)}</span></>}
              </div>
            </div>
            <div className="flex items-center gap-2 shrink-0">
              {story.keyword && <Pill text={story.keyword} color="bg-gray-100 text-gray-600" />}
              <Heart filled={!!story.is_favourite} onClick={() => onFav(story.id)} />
            </div>
          </div>

          {scored && (
            <div className="space-y-1.5 pt-1">
              <div className="flex items-center gap-2 mb-1">
                <span className="text-xs font-medium text-gray-500">Overall</span>
                <span className="inline-flex items-center justify-center w-7 h-7 rounded-full bg-brand text-white text-xs font-bold">{story.overall_score?.toFixed?.(1) ?? story.overall_score}</span>
                {story.category && <Pill text={story.category} color="bg-teal/10 text-teal" />}
              </div>
              <ScoreBar label="Brand Relevance" score={story.brand_relevance_score} color="bg-brand" />
              <ScoreBar label="Journalistic Value" score={story.journalistic_value_score} color="bg-green" />
              <ScoreBar label="Timeliness" score={story.timeliness_score} color="bg-amber" />
              <button onClick={() => setExpanded(!expanded)} className="text-xs text-brand hover:underline mt-1">
                {expanded ? 'Hide reasons' : 'Why this score?'}
              </button>
              {expanded && (
                <div className="text-xs text-gray-600 space-y-1 bg-gray-50 rounded p-3 mt-1">
                  <p><strong>Brand Relevance:</strong> {story.brand_relevance_reason}</p>
                  <p><strong>Journalistic Value:</strong> {story.journalistic_value_reason}</p>
                  <p><strong>Timeliness:</strong> {story.timeliness_reason}</p>
                </div>
              )}
            </div>
          )}

          {(topicReasoning || hasAngles) && (
            <div className="space-y-2 pt-1">
              <div className="flex items-center justify-end gap-3 text-xs">
                <button onClick={expandAll} className="text-brand hover:underline">Expand all</button>
                <span className="text-gray-300">|</span>
                <button onClick={collapseAll} className="text-gray-500 hover:text-brand hover:underline">Collapse all</button>
              </div>

              {hasAngles && story.recommended_style && (
                <Collapsible
                  open={openStyle}
                  onToggle={() => setOpenStyle(!openStyle)}
                  title="Recommended Content Style"
                  right={
                    <span className={`inline-flex items-center px-3 py-1 rounded-full text-xs font-bold tracking-wide ${STYLE_BADGE[story.recommended_style] || STYLE_BADGE['UNKNOWN']}`}>
                      {story.recommended_style}
                    </span>
                  }
                >
                  {story.style_reason && (
                    <p className="text-sm italic text-gray-600">{story.style_reason}</p>
                  )}
                </Collapsible>
              )}

              {topicReasoning && (
                <Collapsible
                  open={openWhy}
                  onToggle={() => setOpenWhy(!openWhy)}
                  title="Why This Topic"
                >
                  <blockquote className="border-l-4 border-teal pl-3 text-sm italic text-gray-600 bg-gray-50 rounded-r py-2 pr-3">
                    {topicReasoning}
                  </blockquote>
                </Collapsible>
              )}

              {hasAngles && (
                <Collapsible
                  open={openAngles}
                  onToggle={() => setOpenAngles(!openAngles)}
                  title="Content Angles"
                  right={
                    <span className="inline-flex items-center px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 text-xs font-medium">
                      {story.angles.length} angles
                    </span>
                  }
                  bodyClass="px-3 pb-3 pt-2"
                >
                  <div className="grid gap-2">
                    {story.angles.map((a, i) => (
                      <AngleCard
                        key={i}
                        angle={a}
                        open={!!openCards[i]}
                        onToggle={() => toggleCard(i)}
                      />
                    ))}
                  </div>
                </Collapsible>
              )}
            </div>
          )}

          <div className="flex flex-wrap gap-2 pt-1">
            {!scored && (
              <button onClick={() => onScore(story.id)} disabled={scoringId === story.id} className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-white bg-brand rounded hover:bg-brand/90 disabled:opacity-50">
                {scoringId === story.id ? <><Spinner /> Scoring...</> : 'Get Score'}
              </button>
            )}
            {!hasAngles && (
              <button onClick={() => onAngle(story.id)} disabled={anglingId === story.id} className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-brand bg-brand/10 rounded hover:bg-brand/20 disabled:opacity-50">
                {anglingId === story.id ? <><Spinner /> Generating...</> : 'Get Content Angle'}
              </button>
            )}
          </div>
        </div>
      );
    }

    /* ── Trend Chart Components ── */
    const TREND_COLORS = ['#534AB7', '#0F6E56', '#BA7517', '#3B6D11', '#1D6FA4'];
    const TREND_PILL_COLORS = [
      'bg-brand/10 text-brand',
      'bg-teal/10 text-teal',
      'bg-amber/10 text-amber',
      'bg-green/10 text-green',
      'bg-blue-100 text-blue-700',
    ];
    const DEFAULT_TREND_KEYWORDS = ['online tutoring', 'edtech', 'AI in education', 'SAT prep', 'coding for kids'];
    const TIMEFRAMES = [
      ['now 1-d', 'Past 24 hours'],
      ['today 7-d', 'Past 7 days'],
      ['today 1-m', 'Past 30 days'],
      ['today 3-m', 'Past 90 days'],
      ['today 12-m', 'Past 12 months'],
    ];

    function LineChart({ data, keywords }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        if (!canvasRef.current || !data || data.length === 0 || typeof Chart === 'undefined') return;

        const datasets = keywords.map((kw, i) => ({
          label: kw,
          data: data.map(p => p[kw] ?? 0),
          borderColor: TREND_COLORS[i % TREND_COLORS.length],
          backgroundColor: TREND_COLORS[i % TREND_COLORS.length] + '22',
          tension: 0.3,
          pointRadius: 2,
          borderWidth: 2,
          fill: false,
        }));

        chartRef.current = new Chart(canvasRef.current, {
          type: 'line',
          data: { labels: data.map(p => p.date), datasets },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
              y: { min: 0, max: 100, title: { display: true, text: 'Interest score (0–100)' } },
              x: { ticks: { maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } },
            },
            plugins: {
              legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
              tooltip: { mode: 'index', intersect: false },
            },
          },
        });

        return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
      }, [data, keywords]);

      return <canvas ref={canvasRef}></canvas>;
    }

    function RegionChart({ data, keyword }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        if (!canvasRef.current || !data || data.length === 0 || !keyword || typeof Chart === 'undefined') return;

        const sorted = [...data]
          .map(r => ({ region: r.region, value: r.values?.[keyword] ?? 0 }))
          .filter(r => r.value > 0)
          .sort((a, b) => b.value - a.value)
          .slice(0, 10);

        if (sorted.length === 0) return;

        chartRef.current = new Chart(canvasRef.current, {
          type: 'bar',
          data: {
            labels: sorted.map(r => r.region),
            datasets: [{
              label: keyword,
              data: sorted.map(r => r.value),
              backgroundColor: '#534AB7',
              borderRadius: 3,
            }],
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: { min: 0, max: 100, title: { display: true, text: 'Interest score' } },
            },
            plugins: {
              legend: { display: false },
              tooltip: { enabled: true },
            },
          },
        });

        return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
      }, [data, keyword]);

      return <canvas ref={canvasRef}></canvas>;
    }

    function RelatedQueriesGrid({ related, keywords }) {
      if (!keywords || keywords.length === 0) return null;
      const cols = Math.max(keywords.length, 1);
      return (
        <div className="overflow-x-auto">
          <div className="grid gap-3" style={{ gridTemplateColumns: `repeat(${cols}, minmax(220px, 1fr))` }}>
            {keywords.map((kw, i) => {
              const d = (related && related[kw]) || { rising: [], top: [] };
              const pill = TREND_PILL_COLORS[i % TREND_PILL_COLORS.length];
              const empty = (!d.rising || d.rising.length === 0) && (!d.top || d.top.length === 0);
              return (
                <div key={kw} className="bg-white border border-gray-200 rounded-lg p-3 space-y-3">
                  <Pill text={kw} color={pill} />
                  {empty ? (
                    <p className="text-xs text-gray-400">No related queries found</p>
                  ) : (
                    <>
                      {d.rising && d.rising.length > 0 && (
                        <div className="space-y-1.5">
                          <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-500">Rising</p>
                          <div className="space-y-1">
                            {d.rising.map((q, idx) => (
                              <div key={idx} className="inline-flex items-center gap-1.5 bg-green/10 text-green text-xs px-2 py-1 rounded mr-1">
                                <span className="font-bold">↑</span><span>{q.query}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                      {d.top && d.top.length > 0 && (
                        <div className="space-y-1.5">
                          <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-500">Top</p>
                          <div className="space-y-1.5">
                            {d.top.map((q, idx) => {
                              const pct = Math.max(0, Math.min((q.value || 0), 100));
                              return (
                                <div key={idx} className="space-y-0.5">
                                  <p className="text-xs text-gray-700">{q.query}</p>
                                  <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-brand rounded-full" style={{ width: pct + '%' }}></div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ── App ── */
    function App() {
      const [tab, setTab] = useState('search');
      const [toasts, setToasts] = useState([]);
      const toastId = useRef(0);

      /* search state */
      const [keywords, setKeywords] = useState([]);
      const [kwInput, setKwInput] = useState('');
      const [usState, setUsState] = useState('all');
      const [dateFrom, setDateFrom] = useState(defaultFrom);
      const [dateTo, setDateTo] = useState(defaultTo);
      const [searching, setSearching] = useState(false);
      const [stories, setStories] = useState([]);
      const [searchMeta, setSearchMeta] = useState(null);
      const [sortBy, setSortBy] = useState('recent');
      const [scoringId, setScoringId] = useState(null);
      const [anglingId, setAnglingId] = useState(null);
      const [batchProgress, setBatchProgress] = useState(null);

      /* fav state */
      const [favs, setFavs] = useState([]);
      const [favsLoading, setFavsLoading] = useState(false);
      const [angleProgress, setAngleProgress] = useState(null);

      /* history state */
      const [searches, setSearches] = useState([]);
      const [histLoading, setHistLoading] = useState(false);

      /* trends state */
      const [trendKeywords, setTrendKeywords] = useState(DEFAULT_TREND_KEYWORDS.slice(0));
      const [trendKwInput, setTrendKwInput] = useState('');
      const [trendTimeframe, setTrendTimeframe] = useState('today 7-d');
      const [trendState, setTrendState] = useState('all');
      const [trendsLoading, setTrendsLoading] = useState(false);
      const [trendsData, setTrendsData] = useState(null);
      const [trendRegionKeyword, setTrendRegionKeyword] = useState(null);
      const [trendHistory, setTrendHistory] = useState([]);
      const [trendHistoryOpen, setTrendHistoryOpen] = useState(false);
      const trendsLoadedRef = useRef(false);

      const toast = useCallback((msg, variant = 'error') => {
        const id = ++toastId.current;
        setToasts(t => [...t, { id, msg, variant }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
      }, []);

      const favCount = favs.length || stories.filter(s => s.is_favourite).length;

      /* search */
      async function doSearch() {
        if (!keywords.length) return;
        setSearching(true);
        setSearchMeta(null);
        setStories([]);
        try {
          const r = await api('/api/search', {
            method: 'POST',
            body: JSON.stringify({ keywords, date_from: dateFrom, date_to: dateTo, us_state: usState }),
          });
          const data = await r.json();
          setStories(data.stories);
          setSearchMeta({ searchId: data.search_id, total: data.total, keywords: [...keywords], usState });
        } catch (e) { toast('Search failed: ' + e.message); }
        setSearching(false);
      }

      function addKeyword(e) {
        if (e.key === 'Enter' && kwInput.trim() && keywords.length < 10) {
          e.preventDefault();
          const kw = kwInput.trim();
          if (!keywords.includes(kw)) setKeywords([...keywords, kw]);
          setKwInput('');
        }
      }

      async function scoreOne(id) {
        setScoringId(id);
        try {
          const r = await api(`/api/stories/${id}/score`, { method: 'POST' });
          const s = await r.json();
          setStories(prev => prev.map(x => x.id === id ? { ...x, ...s } : x));
        } catch (e) { toast('Scoring failed'); }
        setScoringId(null);
      }

      async function angleOne(id) {
        setAnglingId(id);
        try {
          const r = await api(`/api/stories/${id}/angle`, { method: 'POST' });
          const s = await r.json();
          setStories(prev => prev.map(x => x.id === id ? { ...x, ...s } : x));
        } catch (e) { toast('Angle generation failed'); }
        setAnglingId(null);
      }

      async function scoreAll() {
        const unscored = stories.filter(s => s.overall_score == null);
        if (!unscored.length) return;
        setBatchProgress({ done: 0, total: unscored.length });
        for (let i = 0; i < unscored.length; i++) {
          try {
            const r = await api(`/api/stories/${unscored[i].id}/score`, { method: 'POST' });
            const s = await r.json();
            setStories(prev => prev.map(x => x.id === s.id ? { ...x, ...s } : x));
          } catch (e) { /* continue */ }
          setBatchProgress({ done: i + 1, total: unscored.length });
        }
        setBatchProgress(null);
      }

      async function toggleFav(id) {
        try {
          const r = await api(`/api/stories/${id}/favourite`, { method: 'POST' });
          const data = await r.json();
          setStories(prev => prev.map(x => x.id === id ? { ...x, is_favourite: data.is_favourite ? 1 : 0 } : x));
          setFavs(prev => data.is_favourite ? prev : prev.filter(x => x.id !== id));
        } catch (e) { toast('Failed to update favourite'); }
      }

      const sorted = [...stories].sort((a, b) => {
        if (sortBy === 'relevant') return (b.overall_score || 0) - (a.overall_score || 0);
        return new Date(b.published || 0) - new Date(a.published || 0);
      });

      /* favourites */
      async function loadFavs() {
        setFavsLoading(true);
        try {
          const r = await api('/api/favourites');
          setFavs(await r.json());
        } catch (e) { toast('Failed to load favourites'); }
        setFavsLoading(false);
      }

      async function angleAllFavs() {
        const need = favs.filter(f => !Array.isArray(f.angles) || f.angles.length === 0);
        if (!need.length) return;
        setAngleProgress({ done: 0, total: need.length });
        for (let i = 0; i < need.length; i++) {
          try {
            const r = await api(`/api/stories/${need[i].id}/angle`, { method: 'POST' });
            const s = await r.json();
            setFavs(prev => prev.map(x => x.id === s.id ? { ...x, ...s } : x));
          } catch (e) { /* continue */ }
          setAngleProgress({ done: i + 1, total: need.length });
        }
        setAngleProgress(null);
      }

      async function favScoreOne(id) {
        setScoringId(id);
        try {
          const r = await api(`/api/stories/${id}/score`, { method: 'POST' });
          const s = await r.json();
          setFavs(prev => prev.map(x => x.id === id ? { ...x, ...s } : x));
        } catch (e) { toast('Scoring failed'); }
        setScoringId(null);
      }

      async function favAngleOne(id) {
        setAnglingId(id);
        try {
          const r = await api(`/api/stories/${id}/angle`, { method: 'POST' });
          const s = await r.json();
          setFavs(prev => prev.map(x => x.id === id ? { ...x, ...s } : x));
        } catch (e) { toast('Angle generation failed'); }
        setAnglingId(null);
      }

      async function favToggle(id) {
        try {
          const r = await api(`/api/stories/${id}/favourite`, { method: 'POST' });
          const data = await r.json();
          if (!data.is_favourite) setFavs(prev => prev.filter(x => x.id !== id));
          setStories(prev => prev.map(x => x.id === id ? { ...x, is_favourite: data.is_favourite ? 1 : 0 } : x));
        } catch (e) { toast('Failed to update favourite'); }
      }

      /* history */
      async function loadHistory() {
        setHistLoading(true);
        try {
          const r = await api('/api/searches');
          setSearches(await r.json());
        } catch (e) { toast('Failed to load history'); }
        setHistLoading(false);
      }

      async function viewHistoryStories(s) {
        setTab('search');
        const kws = Array.isArray(s.keywords) ? s.keywords : JSON.parse(s.keywords || '[]');
        setKeywords(kws);
        setUsState(s.us_state || 'all');
        setDateFrom(s.date_from);
        setDateTo(s.date_to);
        setSearchMeta({ searchId: s.id, total: s.story_count, keywords: kws, usState: s.us_state || 'all' });
        try {
          const r = await api(`/api/search/${s.id}/stories`);
          setStories(await r.json());
        } catch (e) { toast('Failed to load stories'); }
      }

      useEffect(() => { if (tab === 'favs') loadFavs(); }, [tab]);
      useEffect(() => { if (tab === 'history') loadHistory(); }, [tab]);

      /* trends functions */
      function addTrendKeyword(e) {
        if (e.key === 'Enter' && trendKwInput.trim() && trendKeywords.length < 5) {
          e.preventDefault();
          const kw = trendKwInput.trim();
          if (!trendKeywords.includes(kw)) setTrendKeywords([...trendKeywords, kw]);
          setTrendKwInput('');
        }
      }

      function applyTrendsResult(data) {
        setTrendsData(data);
        const kws = data?.keywords || [];
        if (kws.length > 0) setTrendRegionKeyword(kws[0]);
      }

      async function loadDefaultTrends() {
        setTrendsLoading(true);
        try {
          const r = await fetch('/api/trends/default');
          if (!r.ok) throw new Error('rate-limited');
          const data = await r.json();
          applyTrendsResult(data);
        } catch (e) {
          toast('Google Trends is temporarily rate-limited. Please wait 60 seconds and try again.', 'warning');
        }
        setTrendsLoading(false);
      }

      async function doTrendSearch() {
        if (!trendKeywords.length) return;
        setTrendsLoading(true);
        try {
          const r = await fetch('/api/trends/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ keywords: trendKeywords, timeframe: trendTimeframe, us_state: trendState }),
          });
          if (!r.ok) throw new Error('rate-limited');
          const data = await r.json();
          applyTrendsResult(data);
          loadTrendHistory();
        } catch (e) {
          toast('Google Trends is temporarily rate-limited. Please wait 60 seconds and try again.', 'warning');
        }
        setTrendsLoading(false);
      }

      async function loadTrendHistory() {
        try {
          const r = await fetch('/api/trends/searches');
          if (!r.ok) return;
          setTrendHistory(await r.json());
        } catch (e) { /* silent */ }
      }

      function reloadTrendSearch(s) {
        const kws = Array.isArray(s.keywords) ? s.keywords : (() => { try { return JSON.parse(s.keywords); } catch { return []; } })();
        setTrendKeywords(kws);
        setTrendTimeframe(s.timeframe || 'today 7-d');
        setTrendState(s.us_state || 'all');
        setTimeout(() => doTrendSearch(), 0);
      }

      useEffect(() => {
        if (tab === 'trends') {
          loadTrendHistory();
          if (!trendsLoadedRef.current) {
            trendsLoadedRef.current = true;
            loadDefaultTrends();
          }
        }
      }, [tab]);

      /* ── render ── */
      return (
        <div className="min-h-screen bg-bg">
          <Toasts toasts={toasts} />

          {/* Nav */}
          <nav className="bg-white border-b border-gray-200 sticky top-0 z-40">
            <div className="max-w-5xl mx-auto px-4 flex items-center h-14 gap-6">
              <span className="font-bold text-brand text-lg tracking-tight">Wiingy</span>
              <div className="flex gap-1 ml-4">
                {[['search','Search'],['favs','Favourites'],['trends','Trends ↗'],['history','History']].map(([k,label]) => (
                  <button key={k} onClick={() => setTab(k)}
                    className={`px-3 py-3.5 text-sm font-medium border-b-2 transition-colors ${tab===k ? 'border-brand text-brand' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                    {label}
                    {k === 'favs' && favCount > 0 && (
                      <span className="ml-1.5 inline-flex items-center justify-center px-1.5 py-0.5 rounded-full text-[10px] font-bold bg-red text-white leading-none">{favCount}</span>
                    )}
                  </button>
                ))}
              </div>
            </div>
          </nav>

          <main className="max-w-5xl mx-auto px-4 py-6">

            {/* ── SEARCH TAB ── */}
            {tab === 'search' && (
              <div className="space-y-5">
                <h1 className="text-2xl font-bold text-gray-900">Wiingy Story Finder</h1>

                {/* Input area */}
                <div className="bg-white border border-gray-200 rounded-lg p-4 space-y-3">
                  <label className="text-sm font-medium text-gray-700">Keywords</label>
                  <div className="flex flex-wrap items-center gap-2 border border-gray-200 rounded px-3 py-2 focus-within:ring-2 focus-within:ring-brand/30">
                    {keywords.map(k => <Pill key={k} text={k} onRemove={() => setKeywords(keywords.filter(x=>x!==k))} />)}
                    {keywords.length < 10 && (
                      <input value={kwInput} onChange={e => setKwInput(e.target.value)} onKeyDown={addKeyword}
                        placeholder={keywords.length ? '' : 'Type a keyword and press Enter'}
                        className="flex-1 min-w-[120px] outline-none text-sm py-1" />
                    )}
                  </div>
                  {keywords.length >= 10 && <p className="text-xs text-amber">Maximum 10 keywords reached</p>}

                  <StateSelector value={usState} onChange={setUsState} />

                  <div className="flex flex-wrap gap-4">
                    <div>
                      <label className="text-xs text-gray-500">From</label>
                      <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} className="block border border-gray-200 rounded px-3 py-1.5 text-sm" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500">To</label>
                      <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} className="block border border-gray-200 rounded px-3 py-1.5 text-sm" />
                    </div>
                  </div>

                  <div>
                    <button onClick={doSearch} disabled={!keywords.length || searching}
                      className="inline-flex items-center gap-2 px-5 py-2 text-sm font-medium text-white bg-brand rounded hover:bg-brand/90 disabled:opacity-50">
                      {searching ? <><Spinner /> Searching...</> : 'Search'}
                    </button>
                    <p className="text-xs text-gray-400 mt-1.5">Fetching up to 10 most recent stories per keyword from Google News US</p>
                  </div>
                </div>

                {/* Results */}
                {searchMeta && (
                  <div className="space-y-4">
                    <div className="flex flex-wrap items-center justify-between gap-3">
                      <p className="text-sm text-gray-600">
                        Found <strong>{searchMeta.total}</strong> stories for <strong>{searchMeta.keywords.join(', ')}</strong>
                      </p>
                      <div className="flex flex-wrap items-center gap-2">
                        <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="text-xs border border-gray-200 rounded px-2 py-1">
                          <option value="recent">Most Recent</option>
                          <option value="relevant">Most Relevant</option>
                        </select>
                        <button onClick={scoreAll} disabled={!!batchProgress}
                          className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-white bg-brand rounded hover:bg-brand/90 disabled:opacity-50">
                          {batchProgress ? <><Spinner /> Scoring {batchProgress.done}/{batchProgress.total}</> : 'Get All Scores'}
                        </button>
                        <button onClick={() => downloadCsv(`/api/export/stories/${searchMeta.searchId}`)}
                          className="px-3 py-1.5 text-xs font-medium text-brand bg-brand/10 rounded hover:bg-brand/20">
                          Download Stories CSV
                        </button>
                      </div>
                    </div>

                    <div className="grid gap-4">
                      {sorted.map(s => (
                        <StoryCard key={s.id} story={s} onScore={scoreOne} onAngle={angleOne} onFav={toggleFav} scoringId={scoringId} anglingId={anglingId} />
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── FAVOURITES TAB ── */}
            {tab === 'favs' && (
              <div className="space-y-5">
                <div className="flex flex-wrap items-center justify-between gap-3">
                  <h1 className="text-2xl font-bold text-gray-900">
                    Saved Stories
                    {favs.length > 0 && <span className="ml-2 inline-flex items-center justify-center px-2 py-0.5 rounded-full text-xs font-bold bg-brand text-white">{favs.length}</span>}
                  </h1>
                  {favs.length > 0 && (
                    <div className="flex flex-wrap gap-2">
                      <button onClick={angleAllFavs} disabled={!!angleProgress}
                        className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-white bg-brand rounded hover:bg-brand/90 disabled:opacity-50">
                        {angleProgress ? <><Spinner /> Generating angles... {angleProgress.done} of {angleProgress.total}</> : 'Get Angles for All'}
                      </button>
                      <button onClick={() => downloadCsv('/api/export/favourites')}
                        className="px-3 py-1.5 text-xs font-medium text-brand bg-brand/10 rounded hover:bg-brand/20">
                        Download All as CSV
                      </button>
                      <button onClick={() => downloadCsv('/api/export/favourites')}
                        className="px-3 py-1.5 text-xs font-medium text-teal bg-teal/10 rounded hover:bg-teal/20">
                        Download Angles CSV
                      </button>
                    </div>
                  )}
                </div>

                {favsLoading ? (
                  <div className="flex justify-center py-12"><Spinner size="w-6 h-6" /></div>
                ) : favs.length === 0 ? (
                  <div className="text-center py-16 text-gray-400">
                    <p className="text-lg">No saved stories yet.</p>
                    <p className="text-sm mt-1">Heart a story in Search to save it here.</p>
                  </div>
                ) : (
                  <div className="grid gap-4">
                    {favs.map(s => (
                      <StoryCard key={s.id} story={{...s, is_favourite: 1}} onScore={favScoreOne} onAngle={favAngleOne} onFav={favToggle} scoringId={scoringId} anglingId={anglingId} />
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* ── TRENDS TAB ── */}
            {tab === 'trends' && (
              <div className="space-y-5">
                <h1 className="text-2xl font-bold text-gray-900">Trending in Education</h1>

                {/* Search panel */}
                <div className="bg-white border border-gray-200 rounded-lg p-4 space-y-3">
                  <label className="text-sm font-medium text-gray-700">Keywords</label>
                  <div className="flex flex-wrap items-center gap-2 border border-gray-200 rounded px-3 py-2 focus-within:ring-2 focus-within:ring-brand/30">
                    {trendKeywords.map(k => (
                      <Pill key={k} text={k} onRemove={() => setTrendKeywords(trendKeywords.filter(x => x !== k))} />
                    ))}
                    {trendKeywords.length < 5 && (
                      <input
                        value={trendKwInput}
                        onChange={e => setTrendKwInput(e.target.value)}
                        onKeyDown={addTrendKeyword}
                        placeholder={trendKeywords.length ? '' : 'Type a keyword and press Enter'}
                        className="flex-1 min-w-[120px] outline-none text-sm py-1" />
                    )}
                  </div>
                  {trendKeywords.length >= 5 && <p className="text-xs text-amber">Maximum 5 keywords (Google Trends limit)</p>}

                  <div className="space-y-1.5">
                    <label className="text-sm font-medium text-gray-700">Timeframe</label>
                    <div className="flex flex-wrap gap-1.5">
                      {TIMEFRAMES.map(([val, label]) => (
                        <button
                          key={val}
                          onClick={() => setTrendTimeframe(val)}
                          className={`px-3 py-1 rounded-full text-xs font-medium border transition-colors ${trendTimeframe === val ? 'bg-brand text-white border-brand' : 'bg-white text-gray-600 border-gray-200 hover:border-brand/50'}`}>
                          {label}
                        </button>
                      ))}
                    </div>
                  </div>

                  <StateSelector value={trendState} onChange={setTrendState} />

                  <div>
                    <button onClick={doTrendSearch} disabled={!trendKeywords.length || trendsLoading}
                      className="inline-flex items-center gap-2 px-5 py-2 text-sm font-medium text-white bg-brand rounded hover:bg-brand/90 disabled:opacity-50">
                      {trendsLoading ? <><Spinner /> Fetching...</> : 'Search Trends'}
                    </button>
                    <p className="text-xs text-gray-400 mt-1.5">Data from Google Trends — updated in real time</p>
                  </div>
                </div>

                {/* Interest over time */}
                <div className="bg-white border border-gray-200 rounded-lg p-4 space-y-3">
                  <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-500">Interest Over Time</p>
                  <div className="relative" style={{ height: '320px' }}>
                    {trendsLoading && (
                      <div className="absolute inset-0 flex items-center justify-center bg-white/70 z-10">
                        <Spinner size="w-8 h-8" />
                      </div>
                    )}
                    {trendsData && trendsData.interest_over_time && trendsData.interest_over_time.length > 0 ? (
                      <LineChart data={trendsData.interest_over_time} keywords={trendsData.keywords || []} />
                    ) : !trendsLoading ? (
                      <div className="h-full flex items-center justify-center text-sm text-gray-400">
                        No trend data available for this period
                      </div>
                    ) : null}
                  </div>
                </div>

                {/* Interest by region */}
                <div className="bg-white border border-gray-200 rounded-lg p-4 space-y-3">
                  <div className="flex flex-wrap items-center justify-between gap-2">
                    <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-500">Interest by US State</p>
                    {trendsData && (trendsData.keywords || []).length > 1 && (
                      <select
                        value={trendRegionKeyword || ''}
                        onChange={e => setTrendRegionKeyword(e.target.value)}
                        className="text-xs border border-gray-200 rounded px-2 py-1">
                        {(trendsData.keywords || []).map(k => <option key={k} value={k}>{k}</option>)}
                      </select>
                    )}
                  </div>
                  <div className="relative" style={{ height: '360px' }}>
                    {trendsLoading && (
                      <div className="absolute inset-0 flex items-center justify-center bg-white/70 z-10">
                        <Spinner size="w-8 h-8" />
                      </div>
                    )}
                    {trendsData && trendsData.interest_by_region && trendsData.interest_by_region.length > 0 && trendRegionKeyword ? (
                      <RegionChart data={trendsData.interest_by_region} keyword={trendRegionKeyword} />
                    ) : !trendsLoading ? (
                      <div className="h-full flex items-center justify-center text-sm text-gray-400">
                        No regional data available
                      </div>
                    ) : null}
                  </div>
                </div>

                {/* Related queries */}
                <div className="bg-white border border-gray-200 rounded-lg p-4 space-y-3">
                  <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-500">Related Queries</p>
                  {trendsData && trendsData.related_queries && Object.keys(trendsData.related_queries).length > 0 ? (
                    <RelatedQueriesGrid related={trendsData.related_queries} keywords={trendsData.keywords || []} />
                  ) : !trendsLoading ? (
                    <p className="text-sm text-gray-400">No related queries available</p>
                  ) : (
                    <div className="flex justify-center py-6"><Spinner size="w-6 h-6" /></div>
                  )}
                </div>

                {/* Trend history */}
                <Collapsible
                  open={trendHistoryOpen}
                  onToggle={() => setTrendHistoryOpen(!trendHistoryOpen)}
                  title="Past Trend Searches"
                  right={
                    <span className="inline-flex items-center px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 text-xs font-medium">
                      {trendHistory.length}
                    </span>
                  }
                >
                  {trendHistory.length === 0 ? (
                    <p className="text-sm text-gray-400">No previous trend searches yet.</p>
                  ) : (
                    <div className="grid gap-2">
                      {trendHistory.map(s => {
                        const kws = Array.isArray(s.keywords) ? s.keywords : (() => { try { return JSON.parse(s.keywords); } catch { return [s.keywords]; } })();
                        const tfLabel = (TIMEFRAMES.find(([v]) => v === s.timeframe) || [null, s.timeframe])[1];
                        return (
                          <div key={s.id} className="flex flex-wrap items-center justify-between gap-2 border border-gray-200 rounded p-2.5">
                            <div className="flex flex-wrap gap-1.5 items-center">
                              {kws.map(k => <Pill key={k} text={k} color="bg-brand/10 text-brand" />)}
                              <span className="text-xs text-gray-500">· {tfLabel} · {s.us_state && s.us_state !== 'all' ? s.us_state : 'All States'} · {fmtDate(s.created_at)}</span>
                            </div>
                            <button onClick={() => reloadTrendSearch(s)} className="px-2.5 py-1 text-xs font-medium text-brand bg-brand/10 rounded hover:bg-brand/20">
                              Reload
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </Collapsible>
              </div>
            )}

            {/* ── HISTORY TAB ── */}
            {tab === 'history' && (
              <div className="space-y-5">
                <h1 className="text-2xl font-bold text-gray-900">Search History</h1>

                {histLoading ? (
                  <div className="flex justify-center py-12"><Spinner size="w-6 h-6" /></div>
                ) : searches.length === 0 ? (
                  <div className="text-center py-16 text-gray-400">
                    <p className="text-lg">No searches yet.</p>
                    <p className="text-sm mt-1">Go to Search to get started.</p>
                  </div>
                ) : (
                  <div className="grid gap-4">
                    {searches.map(s => {
                      const kws = Array.isArray(s.keywords) ? s.keywords : (() => { try { return JSON.parse(s.keywords); } catch { return [s.keywords]; } })();
                      return (
                        <div key={s.id} className="bg-white border border-gray-200 rounded-lg p-4">
                          <div className="flex flex-wrap items-start justify-between gap-3">
                            <div className="space-y-1.5">
                              <div className="flex flex-wrap gap-1.5">
                                {kws.map(k => <Pill key={k} text={k} color="bg-brand/10 text-brand" />)}
                                <Pill text={s.us_state && s.us_state !== 'all' ? s.us_state : 'All States'} color="bg-teal/10 text-teal" />
                              </div>
                              <div className="text-xs text-gray-500">
                                {fmtDate(s.date_from)} — {fmtDate(s.date_to)} · {s.story_count} stories · {fmtDate(s.created_at)}
                              </div>
                            </div>
                            <div className="flex gap-2">
                              <button onClick={() => viewHistoryStories(s)} className="px-3 py-1.5 text-xs font-medium text-white bg-brand rounded hover:bg-brand/90">
                                View Stories
                              </button>
                              <button onClick={() => downloadCsv(`/api/export/stories/${s.id}`)} className="px-3 py-1.5 text-xs font-medium text-brand bg-brand/10 rounded hover:bg-brand/20">
                                Download CSV
                              </button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
