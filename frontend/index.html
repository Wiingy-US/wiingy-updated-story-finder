<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiingy Story Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#534AB7',
            teal: '#0F6E56',
            amber: '#BA7517',
            green: '#3B6D11',
            red: '#E24B4A',
            bg: '#f9f9f8',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    body { background: #f9f9f8; }
    .score-bar-fill { transition: width 0.4s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* ── helpers ── */
    function api(path, opts = {}) {
      return fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      }).then(r => {
        if (!r.ok) throw new Error(`API error ${r.status}`);
        return r;
      });
    }

    function downloadCsv(path) {
      const a = document.createElement('a');
      a.href = path;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function fmtDate(d) {
      if (!d) return '';
      const p = new Date(d);
      if (isNaN(p)) return d;
      return p.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function defaultFrom() {
      const d = new Date(); d.setDate(d.getDate() - 7);
      return d.toISOString().slice(0, 10);
    }
    function defaultTo() { return new Date().toISOString().slice(0, 10); }

    const US_STATES = [
      'All States','Alabama','Alaska','Arizona','Arkansas','California','Colorado',
      'Connecticut','Delaware','Florida','Georgia','Hawaii','Idaho','Illinois',
      'Indiana','Iowa','Kansas','Kentucky','Louisiana','Maine','Maryland',
      'Massachusetts','Michigan','Minnesota','Mississippi','Missouri','Montana',
      'Nebraska','Nevada','New Hampshire','New Jersey','New Mexico','New York',
      'North Carolina','North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania',
      'Rhode Island','South Carolina','South Dakota','Tennessee','Texas','Utah',
      'Vermont','Virginia','Washington','West Virginia','Wisconsin','Wyoming'
    ];

    /* ── State Selector ── */
    function StateSelector({ value, onChange }) {
      const [open, setOpen] = useState(false);
      const [filter, setFilter] = useState('');
      const ref = useRef(null);

      useEffect(() => {
        function handleClick(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
        document.addEventListener('mousedown', handleClick);
        return () => document.removeEventListener('mousedown', handleClick);
      }, []);

      const filtered = US_STATES.filter(s => s.toLowerCase().includes(filter.toLowerCase()));
      const displayValue = value === 'all' ? 'All States' : value;

      return (
        <div className="space-y-1">
          <label className="text-sm font-medium text-gray-700">US State</label>
          <div className="flex items-center gap-2">
            <div ref={ref} className="relative">
              <button type="button" onClick={() => { setOpen(!open); setFilter(''); }}
                className="flex items-center gap-1.5 border border-gray-200 rounded px-3 py-1.5 text-sm text-gray-700 hover:border-brand/50 min-w-[180px] justify-between">
                <span>{displayValue}</span>
                <svg className="w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
              </button>
              {open && (
                <div className="absolute z-50 mt-1 w-56 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden">
                  <div className="p-2 border-b border-gray-100">
                    <input autoFocus value={filter} onChange={e => setFilter(e.target.value)}
                      placeholder="Search states..."
                      className="w-full text-sm px-2 py-1 border border-gray-200 rounded outline-none focus:ring-1 focus:ring-brand/30" />
                  </div>
                  <div className="max-h-48 overflow-y-auto">
                    {filtered.map(s => (
                      <button key={s} type="button"
                        onClick={() => { onChange(s === 'All States' ? 'all' : s); setOpen(false); setFilter(''); }}
                        className={`block w-full text-left px-3 py-1.5 text-sm hover:bg-brand/5 ${(s === 'All States' && value === 'all') || s === value ? 'bg-brand/10 text-brand font-medium' : 'text-gray-700'}`}>
                        {s}
                      </button>
                    ))}
                    {filtered.length === 0 && <div className="px-3 py-2 text-xs text-gray-400">No states found</div>}
                  </div>
                </div>
              )}
            </div>
            {value !== 'all' && (
              <Pill text={value} onRemove={() => onChange('all')} />
            )}
          </div>
        </div>
      );
    }

    /* ── Toast ── */
    function Toasts({ toasts }) {
      return (
        <div className="fixed top-4 right-4 z-50 flex flex-col gap-2">
          {toasts.map(t => (
            <div key={t.id} className={`${t.variant === 'warning' ? 'bg-amber' : 'bg-red'} text-white px-4 py-2 rounded shadow-lg text-sm max-w-xs`}>
              {t.msg}
            </div>
          ))}
        </div>
      );
    }

    /* ── Spinner ── */
    function Spinner({ size = 'w-4 h-4' }) {
      return <svg className={`${size} animate-spin`} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeDasharray="30 70" strokeLinecap="round"/></svg>;
    }

    /* ── Pill ── */
    function Pill({ text, onRemove, color = 'bg-brand/10 text-brand' }) {
      return (
        <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium ${color}`}>
          {text}
          {onRemove && <button onClick={onRemove} className="ml-0.5 hover:text-red">×</button>}
        </span>
      );
    }

    /* ── Heart ── */
    function Heart({ filled, onClick }) {
      return (
        <button onClick={onClick} className="text-xl leading-none hover:scale-110 transition-transform" title={filled ? 'Remove from favourites' : 'Save to favourites'}>
          {filled
            ? <svg className="w-5 h-5 text-red fill-current" viewBox="0 0 20 20"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/></svg>
            : <svg className="w-5 h-5 text-gray-400" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/></svg>
          }
        </button>
      );
    }

    /* ── Score Bar ── */
    function ScoreBar({ label, score, color }) {
      const pct = Math.min(Math.max((score / 10) * 100, 0), 100);
      return (
        <div className="flex items-center gap-2 text-xs">
          <span className="w-32 text-gray-600 shrink-0">{label}</span>
          <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
            <div className={`h-full rounded-full score-bar-fill ${color}`} style={{ width: `${pct}%` }}></div>
          </div>
          <span className="w-8 text-right font-semibold text-gray-700">{score}/10</span>
        </div>
      );
    }

    const LENS_COLORS = {
      'Student': 'bg-brand/10 text-brand',
      'Parent': 'bg-amber/10 text-amber',
      'Educator': 'bg-green/10 text-green',
      'System': 'bg-teal/10 text-teal',
      'Opportunity': 'bg-red/10 text-red',
    };

    const LENS_BORDER = {
      'Student': 'border-brand',
      'Parent': 'border-amber',
      'Educator': 'border-green',
      'System': 'border-teal',
      'Opportunity': 'border-red',
    };

    const STYLE_BADGE = {
      'POLICY IMPACT': 'bg-blue-600 text-white',
      'CULTURAL THINK-PIECE': 'bg-brand text-white',
      'NEWS CONSEQUENCE': 'bg-teal text-white',
      'UNKNOWN': 'bg-gray-500 text-white',
    };

    const CATEGORY_STYLE = {
      'Music':     { cls: 'text-white', bg: '#0F6E56', label: '♪ Music' },
      'Education': { cls: 'text-white', bg: '#534AB7', label: 'Education' },
      'Test Prep': { cls: 'text-white', bg: '#BA7517', label: 'Test Prep' },
      'EdTech':    { cls: 'text-white', bg: '#1D6FA4', label: 'EdTech' },
      'Parenting': { cls: 'text-white', bg: '#3B6D11', label: 'Parenting' },
      'Workforce': { cls: 'text-white', bg: '#5F5E5A', label: 'Workforce' },
    };
    const CATEGORY_DEFAULT_BG = '#888780';

    function CategoryPill({ category }) {
      if (!category) return null;
      const style = CATEGORY_STYLE[category];
      const bg = style ? style.bg : CATEGORY_DEFAULT_BG;
      const label = style ? style.label : category;
      return (
        <span className="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold text-white" style={{ backgroundColor: bg }}>
          {label}
        </span>
      );
    }

    function copyAnglePackage(a) {
      const text = `${a.title || ''}\n\n${a.learning_angle || ''}\n\n${a.wiingy_link || ''}`.trim();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
      }
    }

    /* ── Collapsible ── */
    function Collapsible({ open, onToggle, title, right, children, headerClass = '', bodyClass = 'px-4 pb-4 pt-2' }) {
      return (
        <div className="border border-gray-200 rounded-lg bg-white overflow-hidden">
          <div
            onClick={onToggle}
            role="button"
            className={`flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-gray-50 select-none ${headerClass}`}
          >
            <span className={`text-xs text-gray-400 inline-block transition-transform duration-200 shrink-0 ${open ? 'rotate-90' : ''}`}>▶</span>
            <span className="text-sm font-medium text-gray-700 flex-1 min-w-0">{title}</span>
            {right && <div className="shrink-0" onClick={(e) => e.stopPropagation()}>{right}</div>}
          </div>
          <div className={`overflow-hidden transition-[max-height] duration-300 ease-in-out ${open ? 'max-h-[5000px]' : 'max-h-0'}`}>
            <div className={bodyClass}>{children}</div>
          </div>
        </div>
      );
    }

    /* ── Angle Card ── */
    function AngleCard({ angle, open, onToggle }) {
      const [copied, setCopied] = useState(false);
      const borderClass = LENS_BORDER[angle.lens] || 'border-brand';
      const pillClass = LENS_COLORS[angle.lens] || 'bg-brand/10 text-brand';

      function handleCopy(e) {
        e.stopPropagation();
        copyAnglePackage(angle);
        setCopied(true);
        setTimeout(() => setCopied(false), 1800);
      }

      return (
        <div className="border border-gray-200 rounded-lg bg-white overflow-hidden">
          <div
            onClick={onToggle}
            role="button"
            className="flex items-center gap-3 px-3 py-2.5 cursor-pointer hover:bg-gray-50 select-none"
          >
            <span className={`text-xs text-gray-400 inline-block transition-transform duration-200 shrink-0 ${open ? 'rotate-90' : ''}`}>▶</span>
            <Pill text={angle.lens} color={pillClass} />
            <h3 className="text-[15px] font-bold text-gray-900 leading-snug flex-1 min-w-0 line-clamp-2">{angle.title}</h3>
            <button onClick={handleCopy} className="inline-flex items-center gap-1 text-xs text-gray-500 hover:text-brand shrink-0" title="Copy angle package">
              {copied ? (
                <><svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg><span>Copied</span></>
              ) : (
                <><svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg><span>Copy</span></>
              )}
            </button>
          </div>
          <div className={`overflow-hidden transition-[max-height] duration-300 ease-in-out ${open ? 'max-h-[3000px]' : 'max-h-0'}`}>
            <div className="px-4 pb-4 pt-3 space-y-3 border-t border-gray-100">
              {angle.learning_angle && (
                <div className="space-y-1">
                  <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400">Learning Angle</p>
                  <p className={`text-sm text-gray-700 leading-relaxed border-l-4 ${borderClass} pl-3`}>
                    {angle.learning_angle}
                  </p>
                </div>
              )}

              {angle.wiingy_link && (
                <div className="space-y-1">
                  <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400">Wiingy Link</p>
                  <div className="flex items-start gap-2">
                    <span className="shrink-0 inline-flex items-center justify-center w-6 h-6 rounded-full bg-brand text-white text-xs font-bold" title="Wiingy">W</span>
                    <p className="text-sm italic text-gray-700 leading-relaxed">{angle.wiingy_link}</p>
                  </div>
                </div>
              )}

              {angle.suggested_sources && (
                <div className="space-y-1">
                  <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400">Suggested Sources</p>
                  <div className="flex flex-wrap gap-1.5">
                    {angle.suggested_sources.split(',').map((src, i) => {
                      const trimmed = src.trim();
                      return trimmed ? (
                        <span key={i} className="inline-flex items-center px-2 py-0.5 rounded bg-gray-100 text-gray-600 text-xs font-medium">
                          {trimmed}
                        </span>
                      ) : null;
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ── Music Angle Display ── */
    function MusicAngleDisplay({ story, expandAllState }) {
      const [openClass, setOpenClass] = useState(false);
      const [openChain, setOpenChain] = useState(false);
      const [openAngle, setOpenAngle] = useState(true);
      const [copied, setCopied] = useState(false);

      useEffect(() => {
        if (expandAllState === 'expand') { setOpenClass(true); setOpenChain(true); setOpenAngle(true); }
        if (expandAllState === 'collapse') { setOpenClass(false); setOpenChain(false); setOpenAngle(false); }
      }, [expandAllState]);

      const ma = story.music_angle || story.angle;
      const rc = story.reasoning_chain;
      const noAngle = story.no_angle;

      function handleCopy(e) {
        if (e) e.stopPropagation();
        if (!ma) return;
        const text = `${ma.title || ''}\n\n${ma.learning_angle || ''}\n\n${ma.wiingy_link || ''}`.trim();
        if (navigator.clipboard) navigator.clipboard.writeText(text);
        setCopied(true); setTimeout(() => setCopied(false), 1800);
      }

      if (noAngle) {
        return (
          <div className="bg-gray-50 border border-gray-200 rounded-lg p-4 flex items-start gap-3">
            <span className="shrink-0 inline-flex items-center justify-center w-8 h-8 rounded-full bg-gray-300 text-white text-sm font-bold">✕</span>
            <div>
              <p className="font-bold text-gray-700">No learning angle found</p>
              {story.no_angle_reason && <p className="text-sm italic text-gray-500 mt-1">{story.no_angle_reason}</p>}
              <p className="text-xs text-gray-400 mt-2">This story was skipped because attaching a learning angle would not be genuine.</p>
            </div>
          </div>
        );
      }

      const STEPS = [
        ['step1_specific_observation', 'Specific Observation'],
        ['step2_invisible_audience', 'Invisible Audience'],
        ['step3_underlying_mechanism', 'Underlying Mechanism'],
        ['step4_generalizable_truth', 'Generalizable Truth'],
      ];

      return (
        <div className="space-y-3">
          <Pill text="♪ Music" color="bg-teal/10 text-teal" />

          {/* Section A — Classification */}
          <Collapsible open={openClass} onToggle={() => setOpenClass(!openClass)} title="Story Type"
            right={<div className="flex gap-1.5">
              {story.music_news_type && <Pill text={story.music_news_type} color="bg-teal/10 text-teal" />}
              {story.recommended_style && <Pill text={story.recommended_style} color={STYLE_BADGE[story.recommended_style] ? STYLE_BADGE[story.recommended_style].replace('text-white','text-white') : 'bg-gray-100 text-gray-600'} />}
            </div>}>
            {story.style_reason && <p className="text-sm italic text-gray-500">{story.style_reason}</p>}
            {story.topic_reasoning && <p className="text-sm text-gray-700 mt-1">{story.topic_reasoning}</p>}
          </Collapsible>

          {/* Section B — Reasoning Chain */}
          {rc && (
            <Collapsible open={openChain} onToggle={() => setOpenChain(!openChain)} title="Reasoning Chain"
              right={<span className="inline-flex items-center px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 text-xs font-medium">4 steps</span>}>
              <div className="space-y-0">
                {STEPS.map(([key, label], i) => rc[key] && (
                  <div key={key} className="flex gap-3">
                    <div className="flex flex-col items-center">
                      <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-brand text-white text-xs font-bold shrink-0">{i+1}</span>
                      {i < 3 && <div className="w-px flex-1 bg-brand/20 my-1"></div>}
                    </div>
                    <div className="pb-4 min-w-0">
                      <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-500">{label}</p>
                      <p className="text-sm text-gray-700 mt-0.5">{rc[key]}</p>
                    </div>
                  </div>
                ))}
              </div>
              <div className="text-center text-xs text-gray-400 py-2 border-t border-gray-100">↓ This led to</div>
              <div className="flex items-center gap-2 pt-1">
                <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-500 shrink-0">Bridge selected</p>
                {story.bridge && <Pill text={story.bridge} color="bg-brand/10 text-brand" />}
                {story.bridge_reason && <span className="text-xs italic text-gray-500">{story.bridge_reason}</span>}
              </div>
            </Collapsible>
          )}

          {/* Section C — The Angle */}
          {ma && (
            <Collapsible open={openAngle} onToggle={() => setOpenAngle(!openAngle)} title="Music Content Angle"
              right={<div className="flex items-center gap-2">
                {story.bridge && <Pill text={story.bridge} color="bg-teal/10 text-teal" />}
                <button onClick={handleCopy} className="inline-flex items-center gap-1 text-xs text-gray-500 hover:text-brand">
                  {copied ? 'Copied' : 'Copy'}
                </button>
              </div>}>
              <div className="space-y-3">
                {ma.title && (
                  <div className="space-y-1">
                    <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400">Article Title</p>
                    <h3 className="text-[18px] font-bold text-gray-900 leading-snug">{ma.title}</h3>
                  </div>
                )}
                {ma.learning_angle && (
                  <div className="space-y-1">
                    <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400">Learning Angle</p>
                    <p className="text-sm text-gray-700 leading-relaxed border-l-4 border-teal pl-3">{ma.learning_angle}</p>
                  </div>
                )}
                {ma.wiingy_link && (
                  <div className="space-y-1">
                    <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400">Wiingy Link</p>
                    <div className="flex items-start gap-2">
                      <span className="shrink-0 inline-flex items-center justify-center w-6 h-6 rounded-full bg-brand text-white text-xs font-bold">W</span>
                      <p className="text-sm italic text-gray-700">{ma.wiingy_link}</p>
                    </div>
                  </div>
                )}
                {ma.wiingy_data_hook && (
                  <div className="space-y-1">
                    <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-400">Data to Verify Before Publishing</p>
                    <div className="flex items-start gap-2 bg-amber/10 border border-amber/30 rounded-lg p-3">
                      <span className="shrink-0 text-amber">⚠</span>
                      <p className="text-sm text-gray-700">{ma.wiingy_data_hook}</p>
                    </div>
                  </div>
                )}
              </div>
            </Collapsible>
          )}
        </div>
      );
    }

    /* ── Story Card ── */
    function StoryCard({ story, onScore, onAngle, onFav, scoringId, anglingId }) {
      const [expanded, setExpanded] = useState(false);
      const [openStyle, setOpenStyle] = useState(true);
      const [openWhy, setOpenWhy] = useState(true);
      const [openAngles, setOpenAngles] = useState(true);
      const [openCards, setOpenCards] = useState([false, false, false, false, false]);
      const [musicExpandCmd, setMusicExpandCmd] = useState(null);
      const scored = story.overall_score != null;
      const hasAngles = Array.isArray(story.angles) && story.angles.length > 0;
      const isMusic = story.is_music === true;
      const hasMusicAngle = isMusic && (story.music_angle != null || story.angle != null || story.no_angle === true) && story.angles == null;
      const hasAnyAngle = hasAngles || hasMusicAngle;
      const topicReasoning = story.topic_reasoning;

      function toggleCard(i) {
        setOpenCards(prev => prev.map((v, idx) => idx === i ? !v : v));
      }
      function expandAll() {
        setOpenStyle(true); setOpenWhy(true); setOpenAngles(true);
        setOpenCards([true, true, true, true, true]);
        setMusicExpandCmd('expand');
      }
      function collapseAll() {
        setOpenStyle(false); setOpenWhy(false); setOpenAngles(false);
        setOpenCards([false, false, false, false, false]);
        setMusicExpandCmd('collapse');
      }

      const cardBg = isMusic && story.category === 'Music' ? 'bg-[#f0faf6] border-l-2 border-l-teal' : '';

      return (
        <div className={`bg-white border border-gray-200 rounded-lg p-4 space-y-3 ${cardBg}`}>
          <div className="flex items-start justify-between gap-2">
            <div className="flex-1 min-w-0">
              <a href={story.url} target="_blank" rel="noopener noreferrer" className="font-semibold text-gray-900 hover:text-brand leading-snug block">
                {story.title}
              </a>
              <div className="flex items-center gap-2 mt-1 text-xs text-gray-500">
                <span>{story.source}</span>
                {story.origin === 'guardian' ? (
                  <span className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full bg-teal/10 text-teal text-[10px] font-medium">

    /* ── Quadrant Chart ── */
    function QuadrantChart({ data, onPointClick }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        if (!canvasRef.current || !data || data.length === 0 || typeof Chart === 'undefined') return;

        const quadrantBg = {
          id: 'quadrantBg',
          beforeDraw(chart) {
            const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
            const mx = x.getPixelForValue(50);
            const my = y.getPixelForValue(50);
            const zones = [
              [left, top, mx, my, '#f0faf0'],
              [mx, top, right, my, '#fdf8f0'],
              [left, my, mx, bottom, '#f0f4ff'],
              [mx, my, right, bottom, '#fff0f0'],
            ];
            zones.forEach(([x1, y1, x2, y2, c]) => { ctx.fillStyle = c; ctx.fillRect(x1, y1, x2 - x1, y2 - y1); });
            ctx.fillStyle = '#3B6D11'; ctx.font = '10px sans-serif'; ctx.fillText('SWEET SPOT — Write today', left + 8, top + 14);
            ctx.fillStyle = '#BA7517'; ctx.fillText('SATURATED — Skip', mx + 8, top + 14);
            ctx.fillStyle = '#1D6FA4'; ctx.fillText('EMERGING — Monitor', left + 8, bottom - 6);
            ctx.fillStyle = '#E24B4A'; ctx.fillText('DYING — Skip', mx + 8, bottom - 6);
          }
        };

        chartRef.current = new Chart(canvasRef.current, {
          type: 'scatter',
          data: {
            datasets: [{
              data: data.map(d => ({ x: d.coverage, y: d.velocity, _raw: d })),
              backgroundColor: 'rgba(83,74,183,0.8)',
              pointRadius: 6,
              pointHoverRadius: 9,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
              x: { min: 0, max: 100, title: { display: true, text: 'News Coverage →' }, grid: { color: '#eee' } },
              y: { min: 0, max: 100, title: { display: true, text: '↑ Search Velocity' }, grid: { color: '#eee' } },
            },
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label(ctx) {
                    const r = ctx.raw._raw;
                    const lines = [r.query];
                    if (r.rank) lines.push(`Rank: #${r.rank}`);
                    if (r.traffic) lines.push(`Traffic: ${r.traffic}`);
                    lines.push(`Velocity: ${r.velocity}  Coverage: ${r.coverage}`);
                    (r.articles || []).slice(0, 2).forEach(a => lines.push('📰 ' + (typeof a === 'string' ? a : a.articleTitle || '')));
                    return lines;
                  }
                }
              }
            },
            onClick(e, els) {
              if (els.length && onPointClick) {
                const idx = els[0].index;
                onPointClick(data[idx].query);
              }
            }
          },
          plugins: [quadrantBg],
        });
        return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
      }, [data]);

      return <canvas ref={canvasRef}></canvas>;
    }

    const CATEGORY_PILLS = {
      'Education': 'bg-brand/10 text-brand',
      'Tech & AI': 'bg-blue-100 text-blue-700',
      'Music': 'bg-teal/10 text-teal',
      'Trending': 'bg-amber/10 text-amber',
    };
    const CATEGORY_LIST = ['Education', 'Tech & AI', 'Music', 'Trending'];

    /* ── Trending Table ── */
    function TrendingTable({ data, onQueryClick }) {
      const [sortCol, setSortCol] = useState('rank');
      const [sortAsc, setSortAsc] = useState(true);
      const [activeCats, setActiveCats] = useState(null);

      function toggleSort(col) {
        if (sortCol === col) { setSortAsc(!sortAsc); } else { setSortCol(col); setSortAsc(true); }
      }

      function toggleCat(cat) {
        if (activeCats === null) {
          setActiveCats(new Set([cat]));
        } else if (activeCats.has(cat)) {
          const next = new Set(activeCats);
          next.delete(cat);
          setActiveCats(next.size === 0 ? null : next);
        } else {
          setActiveCats(new Set([...activeCats, cat]));
        }
      }

      const catCounts = {};
      (data || []).forEach(r => {
        const c = r.category || 'Trending';
        catCounts[c] = (catCounts[c] || 0) + 1;
      });

      const filtered = activeCats === null ? (data || []) : (data || []).filter(r => activeCats.has(r.category || 'Trending'));
      const sorted = [...filtered].sort((a, b) => {
        let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
        if (typeof av === 'number' && typeof bv === 'number') return sortAsc ? av - bv : bv - av;
        return sortAsc ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
      });

      function SortArrow({ col }) {
        if (sortCol !== col) return null;
        return <span className="ml-0.5 text-brand">{sortAsc ? '▲' : '▼'}</span>;
      }

      return (
        <div className="space-y-3">
          <div className="flex flex-wrap items-center gap-1.5">
            <button onClick={() => setActiveCats(null)}
              className={`px-2.5 py-1 rounded-full text-xs font-medium border transition-colors ${activeCats === null ? 'bg-brand text-white border-brand' : 'bg-white text-gray-600 border-gray-200 hover:border-brand/50'}`}>
              All
            </button>
            {CATEGORY_LIST.map(cat => {
              const count = catCounts[cat] || 0;
              const active = activeCats !== null && activeCats.has(cat);
              return (
                <button key={cat} onClick={() => toggleCat(cat)}
                  className={`px-2.5 py-1 rounded-full text-xs font-medium border transition-colors ${active ? 'bg-brand text-white border-brand' : 'bg-white text-gray-600 border-gray-200 hover:border-brand/50'}`}>
                  {cat} ({count})
                </button>
              );
            })}
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-left text-[10px] uppercase tracking-wider text-gray-500 border-b border-gray-200">
                  <th className="px-3 py-2 cursor-pointer hover:text-brand" onClick={() => toggleSort('rank')}>Rank<SortArrow col="rank" /></th>
                  <th className="px-3 py-2 cursor-pointer hover:text-brand" onClick={() => toggleSort('query')}>Query<SortArrow col="query" /></th>
                  <th className="px-3 py-2 cursor-pointer hover:text-brand" onClick={() => toggleSort('category')}>Topic Area<SortArrow col="category" /></th>
                  <th className="px-3 py-2 text-right cursor-pointer hover:text-brand" onClick={() => toggleSort('traffic')}>Traffic<SortArrow col="traffic" /></th>
                  <th className="px-3 py-2 cursor-pointer hover:text-brand" onClick={() => toggleSort('started')}>Started<SortArrow col="started" /></th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((row, i) => (
                  <tr key={i} className={`border-b border-gray-100 hover:border-l-2 hover:border-l-brand transition-all ${i % 2 === 0 ? 'bg-white' : 'bg-bg'}`}>
                    <td className="px-3 py-2 text-gray-500 font-medium">{row.rank}</td>
                    <td className="px-3 py-2">
                      <button onClick={() => onQueryClick && onQueryClick(row.query)} className="font-bold text-gray-900 hover:text-brand text-left">{row.query}</button>
                    </td>
                    <td className="px-3 py-2">
                      <Pill text={row.category || 'Trending'} color={CATEGORY_PILLS[row.category] || 'bg-gray-100 text-gray-600'} />
                    </td>
                    <td className="px-3 py-2 text-right text-gray-600">{row.traffic || '—'}</td>
                    <td className="px-3 py-2 text-gray-400 text-xs">{row.started || '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    /* ── App ── */
    function App() {
      const [tab, setTab] = useState('search');
      const [toasts, setToasts] = useState([]);
      const toastId = useRef(0);

      /* search state */
      const [keywords, setKeywords] = useState([]);
      const [kwInput, setKwInput] = useState('');
      const [usState, setUsState] = useState('all');
      const [dateFrom, setDateFrom] = useState(defaultFrom);
      const [dateTo, setDateTo] = useState(defaultTo);
      const [searching, setSearching] = useState(false);
      const [stories, setStories] = useState([]);
      const [searchMeta, setSearchMeta] = useState(null);
      const [sortBy, setSortBy] = useState('recent');
      const [scoringId, setScoringId] = useState(null);
      const [anglingId, setAnglingId] = useState(null);
      const [batchProgress, setBatchProgress] = useState(null);
      const [sourceFilter, setSourceFilter] = useState('all');

      /* fav state */
      const [favs, setFavs] = useState([]);
      const [favsLoading, setFavsLoading] = useState(false);
      const [angleProgress, setAngleProgress] = useState(null);

      /* history state */
      const [searches, setSearches] = useState([]);
      const [histLoading, setHistLoading] = useState(false);

      /* discovery state */
      const [discoveryData, setDiscoveryData] = useState(null);
      const [discoveryLoading, setDiscoveryLoading] = useState(false);
      const [discoveryError, setDiscoveryError] = useState(null);
      const [showRawDiscovery, setShowRawDiscovery] = useState(false);
      const discoveryLoadedRef = useRef(false);
      const [explorerPrefill, setExplorerPrefill] = useState(null);

      const toast = useCallback((msg, variant = 'error') => {
        const id = ++toastId.current;
        setToasts(t => [...t, { id, msg, variant }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
      }, []);

      const favCount = favs.length || stories.filter(s => s.is_favourite).length;

      /* search */
      async function doSearch() {
        if (!keywords.length) return;
        setSearching(true);
        setSearchMeta(null);
        setStories([]);
        try {
          const r = await api('/api/search', {
            method: 'POST',
            body: JSON.stringify({ keywords, date_from: dateFrom, date_to: dateTo, us_state: usState }),
          });
          const data = await r.json();
          setStories(data.stories);
          setSearchMeta({ searchId: data.search_id, total: data.total, keywords: [...keywords], usState });
        } catch (e) { toast('Search failed: ' + e.message); }
        setSearching(false);
      }

      function addKeyword(e) {
        if (e.key === 'Enter' && kwInput.trim() && keywords.length < 10) {
          e.preventDefault();
          const kw = kwInput.trim();
          if (!keywords.includes(kw)) setKeywords([...keywords, kw]);
          setKwInput('');
        }
      }

      async function scoreOne(id) {
        setScoringId(id);
        try {
          const r = await api(`/api/stories/${id}/score`, { method: 'POST' });
          const s = await r.json();
          setStories(prev => prev.map(x => x.id === id ? { ...x, ...s } : x));
        } catch (e) { toast('Scoring failed'); }
        setScoringId(null);
      }

      async function angleOne(id) {
        setAnglingId(id);
        try {
          const r = await api(`/api/stories/${id}/angle`, { method: 'POST' });
          const s = await r.json();
          console.log('[angle] API response:', JSON.stringify(s, null, 2));
          console.log('[angle] is_music:', s.is_music);
          console.log('[angle] has angle:', s.music_angle !== null && s.music_angle !== undefined);
          console.log('[angle] has angles:', Array.isArray(s.angles));
          setStories(prev => prev.map(x => x.id === id ? { ...x, ...s } : x));
        } catch (e) { toast('Angle generation failed'); }
        setAnglingId(null);
      }

      async function scoreAll() {
        const unscored = stories.filter(s => s.overall_score == null);
        if (!unscored.length) return;
        setBatchProgress({ done: 0, total: unscored.length });
        for (let i = 0; i < unscored.length; i++) {
          try {
            const r = await api(`/api/stories/${unscored[i].id}/score`, { method: 'POST' });
            const s = await r.json();
            setStories(prev => prev.map(x => x.id === s.id ? { ...x, ...s } : x));
          } catch (e) { /* continue */ }
          setBatchProgress({ done: i + 1, total: unscored.length });
        }
        setBatchProgress(null);
      }

      async function toggleFav(id) {
        try {
          const r = await api(`/api/stories/${id}/favourite`, { method: 'POST' });
          const data = await r.json();
          setStories(prev => prev.map(x => x.id === id ? { ...x, is_favourite: data.is_favourite ? 1 : 0 } : x));
          setFavs(prev => data.is_favourite ? prev : prev.filter(x => x.id !== id));
        } catch (e) { toast('Failed to update favourite'); }
      }

      const filtered = sourceFilter === 'all' ? stories
        : stories.filter(s => sourceFilter === 'guardian' ? s.origin === 'guardian' : s.origin !== 'guardian');
      const sorted = [...filtered].sort((a, b) => {
        if (sortBy === 'source') return (a.origin === 'guardian' ? 0 : 1) - (b.origin === 'guardian' ? 0 : 1) || new Date(b.published || 0) - new Date(a.published || 0);
        if (sortBy === 'relevant') return (b.overall_score || 0) - (a.overall_score || 0);
        return new Date(b.published || 0) - new Date(a.published || 0);
      });
      const guardianCount = stories.filter(s => s.origin === 'guardian').length;
      const rssCount = stories.filter(s => s.origin !== 'guardian').length;

      /* favourites */
      async function loadFavs() {
        setFavsLoading(true);
        try {
          const r = await api('/api/favourites');
          setFavs(await r.json());
        } catch (e) { toast('Failed to load favourites'); }
        setFavsLoading(false);
      }

      async function angleAllFavs() {
        const need = favs.filter(f => !(Array.isArray(f.angles) && f.angles.length > 0) && !f.is_music);
        if (!need.length) return;
        setAngleProgress({ done: 0, total: need.length });
        for (let i = 0; i < need.length; i++) {
          try {
            const r = await api(`/api/stories/${need[i].id}/angle`, { method: 'POST' });
            const s = await r.json();
            setFavs(prev => prev.map(x => x.id === s.id ? { ...x, ...s } : x));
          } catch (e) { /* continue */ }
          setAngleProgress({ done: i + 1, total: need.length });
        }
        setAngleProgress(null);
      }

      async function favScoreOne(id) {
        setScoringId(id);
        try {
          const r = await api(`/api/stories/${id}/score`, { method: 'POST' });
          const s = await r.json();
          setFavs(prev => prev.map(x => x.id === id ? { ...x, ...s } : x));
        } catch (e) { toast('Scoring failed'); }
        setScoringId(null);
      }

      async function favAngleOne(id) {
        setAnglingId(id);
        try {
          const r = await api(`/api/stories/${id}/angle`, { method: 'POST' });
          const s = await r.json();
          console.log('[angle] Fav API response:', JSON.stringify(s, null, 2));
          setFavs(prev => prev.map(x => x.id === id ? { ...x, ...s } : x));
        } catch (e) { toast('Angle generation failed'); }
        setAnglingId(null);
      }

      async function favToggle(id) {
        try {
          const r = await api(`/api/stories/${id}/favourite`, { method: 'POST' });
          const data = await r.json();
          if (!data.is_favourite) setFavs(prev => prev.filter(x => x.id !== id));
          setStories(prev => prev.map(x => x.id === id ? { ...x, is_favourite: data.is_favourite ? 1 : 0 } : x));
        } catch (e) { toast('Failed to update favourite'); }
      }

      /* history */
      async function loadHistory() {
        setHistLoading(true);
        try {
          const r = await api('/api/searches');
          setSearches(await r.json());
        } catch (e) { toast('Failed to load history'); }
        setHistLoading(false);
      }

      async function viewHistoryStories(s) {
        setTab('search');
        const kws = Array.isArray(s.keywords) ? s.keywords : JSON.parse(s.keywords || '[]');
        setKeywords(kws);
        setUsState(s.us_state || 'all');
        setDateFrom(s.date_from);
        setDateTo(s.date_to);
        setSearchMeta({ searchId: s.id, total: s.story_count, keywords: kws, usState: s.us_state || 'all' });
        try {
          const r = await api(`/api/search/${s.id}/stories`);
          setStories(await r.json());
        } catch (e) { toast('Failed to load stories'); }
      }

      useEffect(() => { if (tab === 'favs') loadFavs(); }, [tab]);
      useEffect(() => { if (tab === 'history') loadHistory(); }, [tab]);

      /* discovery functions */
      async function loadDiscovery(force = false) {
        setDiscoveryLoading(true);
        setDiscoveryError(null);
        try {
          const url = force ? '/api/discovery/refresh' : '/api/discovery';
          const r = await fetch(url);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const data = await r.json();
          setDiscoveryData(data);
          if (data?.error) {
            setDiscoveryError(data.error);
            toast('Google Trends data is temporarily unavailable. Click Refresh to try again.', 'warning');
          }
        } catch (e) {
          setDiscoveryError(String(e));
          toast('Google Trends data is temporarily unavailable. Click Refresh to try again.', 'warning');
        }
        setDiscoveryLoading(false);
      }

      function handleExplorerHandoff(query) {
        setExplorerPrefill(query);
        setTab('explorer');
      }

      useEffect(() => {
        if (tab === 'discovery' && !discoveryLoadedRef.current) {
          discoveryLoadedRef.current = true;
          loadDiscovery();
        }
      }, [tab]);

      /* ── render ── */
      return (
        <div className="min-h-screen bg-bg">
          <Toasts toasts={toasts} />

          {/* Nav */}
          <nav className="bg-white border-b border-gray-200 sticky top-0 z-40">
            <div className="max-w-5xl mx-auto px-4 flex items-center h-14 gap-6">
              <span className="font-bold text-brand text-lg tracking-tight">Wiingy</span>
              <div className="flex gap-1 ml-4">
                {[['search','Search'],['favs','Favourites'],['discovery','Discovery ↗'],['history','History']].map(([k,label]) => (
                  <button key={k} onClick={() => setTab(k)}
                    className={`px-3 py-3.5 text-sm font-medium border-b-2 transition-colors ${tab===k ? 'border-brand text-brand' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
                    {label}
                    {k === 'favs' && favCount > 0 && (
                      <span className="ml-1.5 inline-flex items-center justify-center px-1.5 py-0.5 rounded-full text-[10px] font-bold bg-red text-white leading-none">{favCount}</span>
                    )}
                  </button>
                ))}
              </div>
            </div>
          </nav>

          <main className="max-w-5xl mx-auto px-4 py-6">

            {/* ── SEARCH TAB ── */}
            {tab === 'search' && (
              <div className="space-y-5">
                <h1 className="text-2xl font-bold text-gray-900">Wiingy Story Finder</h1>

                {/* Input area */}
                <div className="bg-white border border-gray-200 rounded-lg p-4 space-y-3">
                  <label className="text-sm font-medium text-gray-700">Keywords</label>
                  <div className="flex flex-wrap items-center gap-2 border border-gray-200 rounded px-3 py-2 focus-within:ring-2 focus-within:ring-brand/30">
                    {keywords.map(k => <Pill key={k} text={k} onRemove={() => setKeywords(keywords.filter(x=>x!==k))} />)}
                    {keywords.length < 10 && (
                      <input value={kwInput} onChange={e => setKwInput(e.target.value)} onKeyDown={addKeyword}
                        placeholder={keywords.length ? '' : 'Type a keyword and press Enter'}
                        className="flex-1 min-w-[120px] outline-none text-sm py-1" />
                    )}
                  </div>
                  {keywords.length >= 10 && <p className="text-xs text-amber">Maximum 10 keywords reached</p>}

                  <StateSelector value={usState} onChange={setUsState} />

                  <div className="flex flex-wrap gap-4">
                    <div>
                      <label className="text-xs text-gray-500">From</label>
                      <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} className="block border border-gray-200 rounded px-3 py-1.5 text-sm" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500">To</label>
                      <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} className="block border border-gray-200 rounded px-3 py-1.5 text-sm" />
                    </div>
                  </div>

                  <div>
                    <button onClick={doSearch} disabled={!keywords.length || searching}
                      className="inline-flex items-center gap-2 px-5 py-2 text-sm font-medium text-white bg-brand rounded hover:bg-brand/90 disabled:opacity-50">
                      {searching ? <><Spinner /> Searching...</> : 'Search'}
                    </button>
                    <p className="text-xs text-gray-400 mt-1.5">Fetching up to 10 stories per keyword from Google News RSS and The Guardian</p>
                  </div>
                </div>

                {/* Results */}
                {searchMeta && (
                  <div className="space-y-4">
                    <div className="flex flex-wrap items-center justify-between gap-3">
                      <div>
                        <p className="text-sm text-gray-600">
                          Found <strong>{searchMeta.total}</strong> stories for <strong>{searchMeta.keywords.join(', ')}</strong>
                          {searchMeta.total > 0 && (
                            <span className="text-gray-400"> — {guardianCount} from The Guardian, {rssCount} from RSS</span>
                          )}
                        </p>
                        {(() => {
                          const catCounts = {};
                          stories.forEach(s => { if (s.category) catCounts[s.category] = (catCounts[s.category] || 0) + 1; });
                          const entries = Object.entries(catCounts);
                          if (entries.length === 0) return null;
                          return (
                            <div className="flex flex-wrap items-center gap-1.5 mt-1">
                              {entries.map(([cat, count]) => {
                                const style = CATEGORY_STYLE[cat];
                                const bg = style ? style.bg : CATEGORY_DEFAULT_BG;
                                const label = style ? style.label : cat;
                                return (
                                  <span key={cat} className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold text-white" style={{ backgroundColor: bg }}>
                                    {label} ({count})
                                  </span>
                                );
                              })}
                            </div>
                          );
                        })()}
                      </div>
                      <div className="flex flex-wrap items-center gap-2">
                        <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="text-xs border border-gray-200 rounded px-2 py-1">
                          <option value="recent">Most Recent</option>
                          <option value="relevant">Most Relevant</option>
                          <option value="source">Source Quality</option>
                        </select>
                        <button onClick={scoreAll} disabled={!!batchProgress}
                          className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-white bg-brand rounded hover:bg-brand/90 disabled:opacity-50">
                          {batchProgress ? <><Spinner /> Scoring {batchProgress.done}/{batchProgress.total}</> : 'Get All Scores'}
                        </button>
                        <button onClick={() => downloadCsv(`/api/export/stories/${searchMeta.searchId}`)}
                          className="px-3 py-1.5 text-xs font-medium text-brand bg-brand/10 rounded hover:bg-brand/20">
                          Download Stories CSV
                        </button>
                      </div>
                    </div>

                    <div className="flex items-center gap-1.5">
                      {[['all', 'All Sources'], ['guardian', 'The Guardian only'], ['rss', 'RSS only']].map(([val, label]) => (
                        <button key={val} onClick={() => setSourceFilter(val)}
                          className={`px-3 py-1 rounded-full text-xs font-medium border transition-colors ${sourceFilter === val ? 'bg-brand text-white border-brand' : 'bg-white text-gray-600 border-gray-200 hover:border-brand/50'}`}>
                          {label}
                        </button>
                      ))}
                    </div>

                    <div className="grid gap-4">
                      {sorted.map(s => (
                        <StoryCard key={s.id} story={s} onScore={scoreOne} onAngle={angleOne} onFav={toggleFav} scoringId={scoringId} anglingId={anglingId} />
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── FAVOURITES TAB ── */}
            {tab === 'favs' && (
              <div className="space-y-5">
                <div className="flex flex-wrap items-center justify-between gap-3">
                  <h1 className="text-2xl font-bold text-gray-900">
                    Saved Stories
                    {favs.length > 0 && <span className="ml-2 inline-flex items-center justify-center px-2 py-0.5 rounded-full text-xs font-bold bg-brand text-white">{favs.length}</span>}
                  </h1>
                  {favs.length > 0 && (
                    <div className="flex flex-wrap gap-2">
                      <button onClick={angleAllFavs} disabled={!!angleProgress}
                        className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-white bg-brand rounded hover:bg-brand/90 disabled:opacity-50">
                        {angleProgress ? <><Spinner /> Generating angles... {angleProgress.done} of {angleProgress.total}</> : 'Get Angles for All'}
                      </button>
                      <button onClick={() => downloadCsv('/api/export/favourites')}
                        className="px-3 py-1.5 text-xs font-medium text-brand bg-brand/10 rounded hover:bg-brand/20">
                        Download All as CSV
                      </button>
                      <button onClick={() => downloadCsv('/api/export/favourites')}
                        className="px-3 py-1.5 text-xs font-medium text-teal bg-teal/10 rounded hover:bg-teal/20">
                        Download Angles CSV
                      </button>
                    </div>
                  )}
                </div>

                {favsLoading ? (
                  <div className="flex justify-center py-12"><Spinner size="w-6 h-6" /></div>
                ) : favs.length === 0 ? (
                  <div className="text-center py-16 text-gray-400">
                    <p className="text-lg">No saved stories yet.</p>
                    <p className="text-sm mt-1">Heart a story in Search to save it here.</p>
                  </div>
                ) : (
                  <div className="grid gap-4">
                    {favs.map(s => (
                      <StoryCard key={s.id} story={{...s, is_favourite: 1}} onScore={favScoreOne} onAngle={favAngleOne} onFav={favToggle} scoringId={scoringId} anglingId={anglingId} />
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* ── DISCOVERY TAB ── */}
            {tab === 'discovery' && (
              <div className="space-y-5">
                <div className="flex flex-wrap items-center justify-between gap-3">
                  <h1 className="text-2xl font-bold text-gray-900">Trends Discovery</h1>
                  <div className="flex items-center gap-3">
                    {discoveryData?.cache_age_seconds != null && (
                      <span className="text-xs text-gray-400">Updated {Math.round(discoveryData.cache_age_seconds / 60)} min ago</span>
                    )}
                    <button onClick={() => loadDiscovery(true)} disabled={discoveryLoading}
                      className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-white bg-brand rounded hover:bg-brand/90 disabled:opacity-50">
                      {discoveryLoading ? <><Spinner /> Refreshing...</> : 'Refresh'}
                    </button>
                  </div>
                </div>
                <p className="text-xs text-gray-400 -mt-3">
                  US search trends from Google Trends · Updates every 30 minutes · Data shows relative search interest, not absolute search counts
                </p>

                {discoveryError && (
                  <div className="border border-amber/50 bg-amber/10 text-amber rounded-lg p-3 text-sm">
                    Google Trends data is temporarily unavailable. {discoveryError}. Click Refresh to try again.
                  </div>
                )}

                {!discoveryLoading && discoveryData && (!discoveryData.quadrant_data || discoveryData.quadrant_data.length === 0) && (!discoveryData.top20 || discoveryData.top20.length === 0) && !discoveryError && (
                  <div className="border border-gray-200 bg-gray-50 text-gray-600 rounded-lg p-4 text-sm text-center">
                    Google Trends returned no data. This can happen due to rate limiting. Please wait 60 seconds and click Refresh.
                  </div>
                )}

                {/* Pitch Quadrant */}
                <div className="bg-white border border-gray-200 rounded-lg p-4 space-y-3">
                  <div className="flex items-center gap-1.5">
                    <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-500">Pitch Quadrant</p>
                    <span className="text-gray-400 cursor-help text-xs" title="Plot each trend by how fast it is climbing (Y) vs how much press coverage it already has (X). Sweet spot is top-left: high velocity, low coverage.">(?)</span>
                  </div>
                  <div className="relative" style={{ height: '420px' }}>
                    {discoveryLoading && (
                      <div className="absolute inset-0 flex items-center justify-center bg-white/70 z-10">
                        <Spinner size="w-8 h-8" />
                      </div>
                    )}
                    {discoveryData && discoveryData.quadrant_data && discoveryData.quadrant_data.length > 0 ? (
                      <QuadrantChart data={discoveryData.quadrant_data} onPointClick={handleExplorerHandoff} />
                    ) : !discoveryLoading ? (
                      <div className="h-full flex items-center justify-center text-sm text-gray-500 text-center px-4">
                        {discoveryData ? 'No quadrant data available. Click Refresh to try again.' : 'Trend data is loading. This may take up to 30 seconds on first load.'}
                      </div>
                    ) : null}
                  </div>
                  {discoveryData && (
                    <div className="pt-1">
                      <button onClick={() => setShowRawDiscovery(!showRawDiscovery)} className="text-xs text-brand hover:underline">
                        {showRawDiscovery ? 'Hide raw API response' : 'Show raw API response'}
                      </button>
                      {showRawDiscovery && (
                        <pre className="mt-2 text-[10px] bg-gray-50 border border-gray-200 rounded p-3 overflow-auto max-h-64 whitespace-pre-wrap break-words">{JSON.stringify(discoveryData, null, 2)}</pre>
                      )}
                    </div>
                  )}
                </div>

                {/* Top 20 Trending Table */}
                <div className="bg-white border border-gray-200 rounded-lg p-4 space-y-3">
                  <p className="text-[10px] font-semibold uppercase tracking-wider text-gray-500">Top Trending Topics — Education, Music & AI</p>
                  <p className="text-xs text-gray-400 -mt-1">Trending US search terms filtered to education, learning, music and AI topics · Up to 50 results</p>
                  {discoveryData && discoveryData.top20 && discoveryData.top20.length > 0 ? (
                    <TrendingTable data={discoveryData.top20} onQueryClick={handleExplorerHandoff} />
                  ) : !discoveryLoading ? (
                    <p className="text-sm text-gray-400 py-4">No trending data available. Click Refresh to try again.</p>
                  ) : (
                    <div className="flex justify-center py-8"><Spinner size="w-6 h-6" /></div>
                  )}
                </div>
              </div>
            )}

            {/* ── HISTORY TAB ── */}
            {tab === 'history' && (
              <div className="space-y-5">
                <h1 className="text-2xl font-bold text-gray-900">Search History</h1>

                {histLoading ? (
                  <div className="flex justify-center py-12"><Spinner size="w-6 h-6" /></div>
                ) : searches.length === 0 ? (
                  <div className="text-center py-16 text-gray-400">
                    <p className="text-lg">No searches yet.</p>
                    <p className="text-sm mt-1">Go to Search to get started.</p>
                  </div>
                ) : (
                  <div className="grid gap-4">
                    {searches.map(s => {
                      const kws = Array.isArray(s.keywords) ? s.keywords : (() => { try { return JSON.parse(s.keywords); } catch { return [s.keywords]; } })();
                      return (
                        <div key={s.id} className="bg-white border border-gray-200 rounded-lg p-4">
                          <div className="flex flex-wrap items-start justify-between gap-3">
                            <div className="space-y-1.5">
                              <div className="flex flex-wrap gap-1.5">
                                {kws.map(k => <Pill key={k} text={k} color="bg-brand/10 text-brand" />)}
                                <Pill text={s.us_state && s.us_state !== 'all' ? s.us_state : 'All States'} color="bg-teal/10 text-teal" />
                              </div>
                              <div className="text-xs text-gray-500">
                                {fmtDate(s.date_from)} — {fmtDate(s.date_to)} · {s.story_count} stories · {fmtDate(s.created_at)}
                              </div>
                            </div>
                            <div className="flex gap-2">
                              <button onClick={() => viewHistoryStories(s)} className="px-3 py-1.5 text-xs font-medium text-white bg-brand rounded hover:bg-brand/90">
                                View Stories
                              </button>
                              <button onClick={() => downloadCsv(`/api/export/stories/${s.id}`)} className="px-3 py-1.5 text-xs font-medium text-brand bg-brand/10 rounded hover:bg-brand/20">
                                Download CSV
                              </button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
